<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Local Autocorrect</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            width: 320px;
            padding: 16px;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: #1a202c;
            color: #e2e8f0;
        }

        .header {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 20px;
        }

        .header h1 {
            font-size: 18px;
            font-weight: 600;
        }

        .status {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 12px;
            background: #2d3748;
            border-radius: 8px;
            margin-bottom: 16px;
        }

        .status-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: #48bb78;
        }

        .status-dot.offline {
            background: #f56565;
        }

        .status-text {
            font-size: 14px;
        }

        .section {
            margin-bottom: 16px;
        }

        .section-title {
            font-size: 12px;
            font-weight: 600;
            text-transform: uppercase;
            color: #a0aec0;
            margin-bottom: 8px;
        }

        .toggle {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 12px;
            background: #2d3748;
            border-radius: 8px;
            cursor: pointer;
            transition: background 0.2s;
        }

        .toggle:hover {
            background: #374151;
        }

        .toggle input {
            cursor: pointer;
        }

        .stats {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 8px;
        }

        .stat {
            padding: 12px;
            background: #2d3748;
            border-radius: 8px;
            text-align: center;
        }

        .stat-value {
            font-size: 24px;
            font-weight: 700;
            color: #48bb78;
        }

        .stat-label {
            font-size: 11px;
            color: #a0aec0;
            margin-top: 4px;
        }

        .footer {
            margin-top: 16px;
            padding-top: 16px;
            border-top: 1px solid #2d3748;
            font-size: 11px;
            color: #718096;
            text-align: center;
        }

        .link {
            color: #4299e1;
            text-decoration: none;
        }

        .link:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>✨ Local Autocorrect</h1>
    </div>

    <div class="status" id="status">
        <div class="status-dot" id="status-dot"></div>
        <div class="status-text" id="status-text">Checking backend...</div>
    </div>

    <div class="section">
        <div class="section-title">Settings</div>
        <label class="toggle">
            <span>Enable Autocorrect</span>
            <input type="checkbox" id="enable-toggle" checked>
        </label>
    </div>

    <div class="section">
        <div class="section-title">Statistics (Coming Soon)</div>
        <div class="stats">
            <div class="stat">
                <div class="stat-value">127</div>
                <div class="stat-label">Corrections Today</div>
            </div>
            <div class="stat">
                <div class="stat-value">98%</div>
                <div class="stat-label">Accuracy</div>
            </div>
        </div>
    </div>

    <div class="footer">
        100% Offline • Privacy First<br>
        <a href="#" class="link" id="open-settings">Settings</a>
    </div>

    <script src="popup.js"></script>
</body>
</html>
