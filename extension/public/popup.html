<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Local Autocorrect</title>
    <style>
        :root {
            --bg: #0f172a;
            --surface: #1e293b;
            --surface-soft: #334155;
            --text: #e2e8f0;
            --muted: #94a3b8;
            --ok: #22c55e;
            --warn: #f59e0b;
            --danger: #ef4444;
            --accent: #38bdf8;
            --border: #475569;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            width: 380px;
            padding: 14px;
            background: radial-gradient(circle at 12% 12%, #1d4ed8 0%, #0f172a 45%);
            color: var(--text);
            font-family: ui-sans-serif, system-ui, -apple-system, Segoe UI, sans-serif;
        }

        .card {
            background: linear-gradient(180deg, rgba(30, 41, 59, 0.95), rgba(15, 23, 42, 0.95));
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 12px;
            margin-bottom: 10px;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
        }

        .title {
            font-size: 16px;
            font-weight: 700;
            letter-spacing: 0.2px;
        }

        .status {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 12px;
            color: var(--muted);
        }

        .dot {
            width: 9px;
            height: 9px;
            border-radius: 99px;
            background: var(--danger);
        }

        .dot.ok {
            background: var(--ok);
        }

        .grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 8px;
        }

        .row {
            display: flex;
            gap: 8px;
            align-items: center;
        }

        label {
            font-size: 12px;
            color: var(--muted);
            display: block;
            margin-bottom: 6px;
        }

        input[type='text'],
        input[type='number'],
        select {
            width: 100%;
            background: rgba(15, 23, 42, 0.85);
            border: 1px solid var(--border);
            border-radius: 8px;
            color: var(--text);
            padding: 7px 8px;
            font-size: 12px;
        }

        input[type='range'] {
            width: 100%;
        }

        .toggle {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 8px 10px;
            border: 1px solid var(--border);
            border-radius: 8px;
            background: rgba(15, 23, 42, 0.85);
            margin-bottom: 10px;
        }

        .btn {
            background: var(--accent);
            color: #0f172a;
            border: none;
            border-radius: 8px;
            padding: 7px 10px;
            font-size: 12px;
            font-weight: 700;
            cursor: pointer;
        }

        .btn.secondary {
            background: var(--surface-soft);
            color: var(--text);
        }

        .btn.warn {
            background: var(--warn);
            color: #1f2937;
        }

        .btn.danger {
            background: var(--danger);
            color: white;
        }

        .btn.block {
            width: 100%;
        }

        .section-title {
            font-size: 11px;
            color: var(--muted);
            text-transform: uppercase;
            margin-bottom: 8px;
            letter-spacing: 0.06em;
        }

        .metric {
            text-align: center;
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 8px;
            background: rgba(15, 23, 42, 0.8);
        }

        .metric .value {
            font-size: 18px;
            font-weight: 700;
            color: #7dd3fc;
        }

        .metric .label {
            font-size: 11px;
            color: var(--muted);
        }

        .list {
            max-height: 120px;
            overflow: auto;
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 6px;
            background: rgba(15, 23, 42, 0.8);
        }

        .list-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            font-size: 12px;
            padding: 4px 3px;
            border-bottom: 1px dashed rgba(71, 85, 105, 0.5);
        }

        .list-item:last-child {
            border-bottom: none;
        }

        .message {
            min-height: 18px;
            font-size: 12px;
            color: #bfdbfe;
            margin-top: 6px;
        }

        .tiny {
            font-size: 11px;
            color: var(--muted);
        }
    </style>
</head>
<body>
    <div class="card">
        <div class="header">
            <div class="title">Local Autocorrect</div>
            <button class="btn secondary" id="refresh-health">Refresh</button>
        </div>
        <div class="status">
            <span class="dot" id="status-dot"></span>
            <span id="status-text">Checking backend...</span>
        </div>
    </div>

    <div class="card">
        <div class="section-title">Runtime Settings</div>
        <div class="toggle">
            <span>Enable Autocorrect</span>
            <input type="checkbox" id="enable-toggle">
        </div>
        <label for="mode-select">Mode</label>
        <select id="mode-select">
            <option value="conservative">Conservative</option>
            <option value="aggressive">Aggressive</option>
            <option value="suggestions_only">Suggestions only</option>
        </select>
        <div class="grid" style="margin-top: 8px;">
            <div>
                <label for="auto-threshold">Auto threshold <span id="auto-threshold-value">0.75</span></label>
                <input id="auto-threshold" type="range" min="0.50" max="0.99" step="0.01">
            </div>
            <div>
                <label for="suggestion-threshold">Suggest threshold <span id="suggestion-threshold-value">0.50</span></label>
                <input id="suggestion-threshold" type="range" min="0.20" max="0.90" step="0.01">
            </div>
        </div>
        <div style="margin-top: 8px;">
            <label for="max-suggestions">Max suggestions</label>
            <input id="max-suggestions" type="number" min="1" max="20">
        </div>
        <div class="row" style="margin-top: 10px;">
            <button class="btn block" id="save-settings">Save settings</button>
            <button class="btn secondary block" id="sync-settings">Sync</button>
        </div>
    </div>

    <div class="card">
        <div class="section-title">Current Domain Profile</div>
        <div class="tiny" id="current-domain-label">Domain: detecting...</div>
        <div class="tiny" id="domain-profile-source" style="margin-top:4px;">Profile source: unknown</div>
        <div class="toggle" style="margin-top:8px;">
            <span>Enable for this domain</span>
            <input type="checkbox" id="domain-enable-toggle">
        </div>
        <label for="domain-mode-select">Domain mode</label>
        <select id="domain-mode-select">
            <option value="conservative">Conservative</option>
            <option value="aggressive">Aggressive</option>
            <option value="suggestions_only">Suggestions only</option>
        </select>
        <div class="grid" style="margin-top: 8px;">
            <div>
                <label for="domain-auto-threshold">Auto <span id="domain-auto-threshold-value">0.75</span></label>
                <input id="domain-auto-threshold" type="range" min="0.50" max="0.99" step="0.01">
            </div>
            <div>
                <label for="domain-suggestion-threshold">Suggest <span id="domain-suggestion-threshold-value">0.50</span></label>
                <input id="domain-suggestion-threshold" type="range" min="0.20" max="0.90" step="0.01">
            </div>
        </div>
        <div class="row" style="margin-top: 8px;">
            <input id="domain-max-suggestions" type="number" min="1" max="20" placeholder="Max suggestions">
            <label style="display:flex; align-items:center; gap:5px; margin:0;">
                <input type="checkbox" id="domain-respect-slang">
                <span class="tiny">Respect slang</span>
            </label>
        </div>
        <div class="row" style="margin-top: 10px;">
            <button class="btn block" id="save-domain-profile">Save domain profile</button>
            <button class="btn secondary block" id="reset-domain-profile">Use defaults</button>
        </div>
    </div>

    <div class="card">
        <div class="section-title">Custom Dictionary</div>
        <div class="row">
            <input id="add-word-input" type="text" placeholder="Add custom word">
            <button class="btn" id="add-word-btn">Add</button>
        </div>
        <div class="list" id="dictionary-list" style="margin-top: 8px;"></div>
    </div>

    <div class="card">
        <div class="section-title">Ignore Rules</div>
        <div class="row">
            <input id="ignore-word-input" type="text" placeholder="Ignore exact word">
            <button class="btn secondary" id="ignore-word-btn">Ignore</button>
        </div>
        <div class="row" style="margin-top: 6px;">
            <input id="ignore-original-input" type="text" placeholder="Original">
            <input id="ignore-suggestion-input" type="text" placeholder="Suggestion">
            <button class="btn secondary" id="ignore-pair-btn">Block</button>
        </div>
    </div>

    <div class="card">
        <div class="section-title">Stats</div>
        <div class="grid">
            <div class="metric"><div class="value" id="stat-total">0</div><div class="label">Requests</div></div>
            <div class="metric"><div class="value" id="stat-auto">0</div><div class="label">Auto</div></div>
            <div class="metric"><div class="value" id="stat-suggest">0</div><div class="label">Suggest</div></div>
            <div class="metric"><div class="value" id="stat-skip">0</div><div class="label">Skipped</div></div>
        </div>
        <div class="section-title" style="margin-top: 10px;">Pain Points</div>
        <div class="list" id="insights-list"></div>
        <div class="row" style="margin-top: 10px;">
            <button class="btn warn block" id="reload-state">Reload state</button>
            <button class="btn danger block" id="reset-stats">Reset stats</button>
        </div>
        <div class="message" id="popup-message"></div>
    </div>

    <script src="popup.js"></script>
</body>
</html>
